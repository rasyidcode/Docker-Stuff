services:
  nginx:
    image: nginx:stable-alpine
    volumes:
      - ../../tr-new:/srv/tr-new
      - ./tr-new.conf:/etc/nginx/conf.d/tr-new.conf
    ports:
      - "80:80"

  php-fpm:
    build:
      context: .
    volumes:
      - ../../tr-new:/srv/tr-new
      - db-data:/var/lib/mysql

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

  mongo:
    image: mongo:8.3
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - mongo-data:/data/db

volumes:
  db-data:
  mongo-data: